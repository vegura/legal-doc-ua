[project]
name = "legal-doc-parser"
version = "0.1.0"
description = ""
authors = [
    {name = "Illia Savenko",email = "i.savenko@sxope.com"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas (>=3.0.0,<4.0.0)",
    "numpy (>=2.4.2,<3.0.0)",
    "jupyterlab (>=4.5.3,<5.0.0)",
    "openai (>=2.18.0,<3.0.0)",
    "google-cloud-storage (>=3.9.0,<4.0.0)",
    "google-cloud-bigquery[pandas] (>=3.40.1,<4.0.0)",
    "matplotlib (>=3.10.9,<4.0.0)",
    "seaborn (>=0.13.2,<0.14.0)"
]

[tool.poetry]
packages = [{include = "legal_doc_parser", from = "src"}]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
